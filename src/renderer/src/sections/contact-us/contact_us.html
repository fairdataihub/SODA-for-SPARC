<!doctype html>
<section

        <div class="dc_con">

            <div class="button_container_contact guided--radio-button-container">
              <div
                data-component-type="checkbox-card"
                data-button-id="contact-feedback"

              ></div>
              <div
                data-component-type="checkbox-card"
                data-button-id="contact-issue"
                data-variant="outline"

              <div

                data-button-id="gdpr-contact"

            <div class="button_container_contact">
              <div
                data-component-type="generic-button"
                data-button-id="button-gather-logs"

              ></div>
              <div
                data-component-type="generic-button"
                data-button-id="button-display-client-id"
                data-variant="outline"
                data-size="lg"
                data-text="Display Client ID"

            <iframe
              data-tally-src="https://tally.so/embed/Gxz1gO?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"

              height="723"

            <div class="flex w-full items-center justify-center pb-2" style="margin-top: 1.3rem">
              <p class="mr-2" style="margin: 0">Made with</p>
              <div id="made-with-love-lottie" class="heart-lottie"></div>
              <p class="ml-2">
                by the
                <a href="https://fairdataihub.org/" target="_blank">FAIR Data Innovations Hub</a>
