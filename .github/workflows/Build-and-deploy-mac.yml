name: Build-and-deploy-mac
run-name: ${{ github.actor }} is building a MAC release for SODA

on:
  push:
    branches:
      - main
      - staging
      - ffm-refactor

jobs:
  deploy-on-mac:
    runs-on: macos-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"

      - name: Configure pysodafair source based on version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ENV_FILE="tools/anaconda-env/environment-MAC.yml"
          if [[ "$VERSION" == *"beta"* ]]; then
            echo "Beta version detected ($VERSION) - using TestPyPI for pysodafair"
            sed -i '' 's/# - --extra-index-url/- --extra-index-url/' "$ENV_FILE"
          else
            echo "Production version detected ($VERSION) - using PyPI for pysodafair"
          fi

      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          activate-environment: env-electron-python
          environment-file: tools/anaconda-env/environment-MAC.yml
          auto-update-conda: true
          auto-activate-base: false
      - run: |
          conda activate  env-electron-python
          conda info
          conda list

      - name: Install package.json modules and their dependencies
        run: npm install --ignore-scripts

      - name: Install macOS-specific dependencies
        run: |
          npm install dmg-license --save-dev

      - uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Deploy the app to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          appleId: ${{ secrets.APPLE_ID }}
          appleIdPassword: ${{ secrets.APPLE_PASSWORD }}
        run: |
          npm run deploy-mac
