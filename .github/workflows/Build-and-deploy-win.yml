name: Build-and-deploy-win
run-name: ${{ github.actor }} is building a Windows release for SODA

on:
  push:
    branches:
      - main
      - staging
      - ffm-refactor

jobs:
  deploy-on-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"

      - name: Configure pysodafair source based on version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ENV_FILE="tools/anaconda-env/environment-Windows.yml"
          if [[ "$VERSION" == *"beta"* ]]; then
            echo "Beta version detected ($VERSION) - using TestPyPI for pysodafair"
            sed -i 's/# - --extra-index-url/- --extra-index-url/' "$ENV_FILE"
          else
            echo "Production version detected ($VERSION) - using PyPI for pysodafair"
          fi

      - uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          activate-environment: env-electron-python
          environment-file: tools/anaconda-env/environment-Windows.yml
          auto-update-conda: true
          auto-activate-base: false
      - run: |
          conda activate  env-electron-python
          conda info
          conda list

      - name: Install package.json modules and their dependencies
        run: npm install --ignore-scripts

      - name: Disable Windows code signing
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV

      - name: Deploy the app to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run deploy-win
